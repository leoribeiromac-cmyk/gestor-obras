setTimeout(function(){document.documentElement.classList.remove('intro-pending')},3000);}}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"></noscript>
<style>:root {
  --bg:#f5f3ef; --bg-2:#eeebe5; --surface:#ffffff; --surface-2:#fafaf7;
  --border:#e4e0d8; --border-strong:#ccc8bf;
  --text:#1a1712; --text-2:#3a3530; --muted:#7a7570;
  --accent:#1f6f4a; --accent-2:#2a8c5f; --accent-soft:rgba(31,111,74,.12);
  --acc:#d9531e; --acc-l:#fdf2ed; --acc-d:#b83d0e;
  --azul:#255bb3; --amarelo:#b8860b; --vermelho:#a8342a;
  --sidebar-bg:#1a1612;
  --sidebar-text:rgba(255,255,255,0.68);
  --sidebar-active:#ffffff;
  --sidebar-active-bg:rgba(255,255,255,0.09);
  --sidebar-hover-bg:rgba(255,255,255,0.05);
  --sidebar-border:rgba(255,255,255,0.09);
  --r:14px; --r-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05);
  --sh-md:0 6px 20px rgba(0,0,0,.08);
  --sh-lg:0 16px 40px rgba(0,0,0,.14);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#14120e; --bg-2:#1c1813; --surface:#211d17; --surface-2:#2a251e;
    --border:#332d24; --border-strong:#463f33;
    --text:#f2ede3; --text-2:#d8d1c4; --muted:#948b7c;
    --accent:#3fae74; --accent-2:#4cc487; --accent-soft:rgba(63,174,116,.15);
    --acc:#e66432; --acc-l:#3d2016; --acc-d:#f07d50;
    --azul:#6ba3d6; --amarelo:#d9a533; --vermelho:#d9645a;
    --sidebar-bg:#0f0d0a;
    --sidebar-text:rgba(242,237,227,0.68);
    --sidebar-active:#ffffff;
    --sidebar-active-bg:rgba(255,255,255,0.12);
    --sidebar-hover-bg:rgba(255,255,255,0.06);
    --sidebar-border:rgba(255,255,255,0.1);
    --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#14120e; --bg-2:#1c1813; --surface:#211d17; --surface-2:#2a251e;
  --border:#332d24; --border-strong:#463f33;
  --text:#f2ede3; --text-2:#d8d1c4; --muted:#948b7c;
  --accent:#3fae74; --accent-2:#4cc487; --accent-soft:rgba(63,174,116,.15);
  --acc:#e66432; --acc-l:#3d2016; --acc-d:#f07d50;
  --azul:#6ba3d6; --amarelo:#d9a533; --vermelho:#d9645a;
  --sidebar-bg:#0f0d0a;
  --sidebar-text:rgba(242,237,227,0.68);
  --sidebar-active:#ffffff;
  --sidebar-active-bg:rgba(255,255,255,0.12);
  --sidebar-hover-bg:rgba(255,255,255,0.06);
  --sidebar-border:rgba(255,255,255,0.1);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#f5f3ef; --bg-2:#eeebe5; --surface:#ffffff; --surface-2:#fafaf7;
  --border:#e4e0d8; --border-strong:#ccc8bf;
  --text:#1a1712; --text-2:#3a3530; --muted:#7a7570;
  --accent:#1f6f4a; --accent-2:#2a8c5f; --accent-soft:rgba(31,111,74,.12);
  --acc:#d9531e; --acc-l:#fdf2ed; --acc-d:#b83d0e;
  --azul:#255bb3; --amarelo:#b8860b; --vermelho:#a8342a;
  --sidebar-bg:#1a1612;
  --sidebar-text:rgba(255,255,255,0.68);
  --sidebar-active:#ffffff;
  --sidebar-active-bg:rgba(255,255,255,0.09);
  --sidebar-hover-bg:rgba(255,255,255,0.05);
  --sidebar-border:rgba(255,255,255,0.09);
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:6px}

@keyframes pageEnter {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.app{display:flex;min-height:100vh}
.side{width:240px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--sidebar-border);cursor:pointer}
.brand img{width:36px;height:36px;border-radius:9px;object-fit:contain;background:#fff}
.brand-t{font-weight:700;font-size:15px;color:var(--sidebar-active);letter-spacing:-.01em;line-height:1.15}
.brand-s{font-size:11px;color:var(--sidebar-text);font-weight:500}
.nav{padding:14px 10px;flex:1}
.nav-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sidebar-text);opacity:.5;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9.5px 12px;border-radius:8px;
  cursor:pointer;color:var(--sidebar-text);font-weight:500;font-size:13.5px;transition:all .15s;margin:2px 0;position:relative}
.nav-item:hover{background:var(--sidebar-hover-bg);color:var(--sidebar-active)}
.nav-item.active{background:var(--sidebar-active-bg);color:var(--sidebar-active);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:3.5px;height:22px;background:var(--accent);border-radius:0 4px 4px 0;box-shadow:0 0 10px var(--accent)}
.nav-ic{width:20px;text-align:center;font-size:16px}
.nav-badge{margin-left:auto;background:rgba(255,255,255,.1);color:var(--sidebar-text);font-size:10.5px;font-weight:700;
  padding:2px 8px;border-radius:12px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent);color:#fff}
.side-foot{padding:14px 12px;border-top:1px solid var(--sidebar-border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:auto}
.side-foot .btn-ghost{color:var(--sidebar-text)}
.side-foot .btn-ghost:hover{background:var(--sidebar-hover-bg);color:var(--sidebar-active)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:5;background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow)}
.topbar h1{font-size:19px;font-weight:700;letter-spacing:-.02em}
.topbar .sub{font-size:12.5px;color:var(--muted)}
.content{padding:26px 28px 60px;max-width:1240px;width:100%;animation:pageEnter 0.35s cubic-bezier(0.2,0,0,1)}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-sm);
  border:1px solid var(--border-strong);background:var(--surface);color:var(--text);
  font-weight:600;font-size:13.5px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface-2);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-pri{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-pri:hover{background:var(--accent-2);border-color:var(--accent-2)}
.btn-acc{background:var(--acc);border-color:var(--acc);color:#fff}
.btn-acc:hover{background:var(--acc-d);border-color:var(--acc-d)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--surface-2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;
  font-size:12px;font-weight:600;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.01em}
.pill-grn{background:rgba(63,174,116,.15);color:var(--accent)}
.pill-ylw{background:rgba(217,165,51,.15);color:var(--amarelo)}
.pill-red{background:rgba(217,100,90,.15);color:var(--vermelho)}
.pill-blu{background:rgba(43,95,140,.15);color:var(--azul)}
.pill-acc{background:rgba(217,83,30,.15);color:#d9531e}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
.card:hover{box-shadow:var(--sh-md)}
.card-h{padding:16px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-t{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.card-st{font-size:12px;color:var(--text-2);font-weight:400;margin-top:2px}
.card-b{padding:20px 22px}

.kpi{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);transition:all .2s cubic-bezier(.2,0,0,1);cursor:pointer}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.2,0,0,1)}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:var(--border-strong)}
.kpi:hover::after{transform:scaleX(1)}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kpi-v{font-size:32px;font-weight:700;letter-spacing:-.04em;font-family:'JetBrains Mono',monospace;margin-top:4px;line-height:1.05;color:var(--text)}
.kpi-s{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.4}
.kpi-hero{background:var(--sidebar-bg);color:#fff;border:none}
.kpi-hero .kpi-l{color:rgba(255,255,255,.5)}
.kpi-hero .kpi-v{color:#fff;font-size:36px}
.kpi-hero .kpi-s{color:rgba(255,255,255,.65)}
.kpi-hero::after{background:linear-gradient(90deg,var(--acc),#f39c12);transform:scaleX(1)}

.bar{height:6px;background:var(--border);border-radius:4px;margin-top:11px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .5s}

table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{text-align:left;padding:11px 14px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface-2);position:sticky;top:0}
table.t td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background .15s}
table.t tr:hover td{background:var(--surface-2)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow)}
.minibar{height:5px;width:120px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.minibar>i{display:block;height:100%;background:var(--accent)}

/* cena 3D da rua (avenida em perspectiva, barras por estaca) — estilo Teotônio */
.scene-3d{position:relative;height:236px;border-radius:12px;overflow:hidden;perspective:1200px;perspective-origin:50% 32%;
  background:radial-gradient(ellipse at 50% 24%, rgba(63,174,116,.12) 0%, transparent 60%),radial-gradient(ellipse at 50% 88%, rgba(0,0,0,.6) 0%, transparent 70%),linear-gradient(180deg,#0d0b08,#181410 55%,#0d0b08)}
.scene-3d::after{content:'';position:absolute;left:0;right:0;top:30%;height:1px;background:linear-gradient(90deg,transparent,rgba(63,174,116,.4) 50%,transparent);box-shadow:0 0 22px rgba(63,174,116,.28);pointer-events:none}
.scene-3d-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform-style:preserve-3d;animation:stg 2.2s .1s cubic-bezier(.22,.7,.2,1) both}
@keyframes stg{0%{transform:rotateX(0deg) translateY(52px) scale(.85);opacity:0}15%{opacity:1}60%{transform:rotateX(40deg) rotateZ(-4deg) scale(1)}100%{transform:rotateX(54deg) rotateZ(-7deg) scale(1);opacity:1}}
.road-3d{position:relative;width:82%;height:124px;transform-style:preserve-3d;border-radius:2px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.26) 0 14px,transparent 14px 30px) 0 50%/100% 2px no-repeat,linear-gradient(180deg,#28241c,#15110d);
  border-top:1px solid rgba(255,255,255,.16);border-bottom:1px solid rgba(255,255,255,.16);box-shadow:inset 0 0 60px rgba(0,0,0,.72),0 6px 26px rgba(0,0,0,.55)}
.road-3d::before,.road-3d::after{content:'';position:absolute;top:0;bottom:0;width:54px;pointer-events:none;z-index:2}
.road-3d::before{left:0;background:linear-gradient(90deg,#15110d,transparent)}
.road-3d::after{right:0;background:linear-gradient(-90deg,#15110d,transparent)}
.bar3d{position:absolute;bottom:50%;width:5px;margin-left:-2.5px;transform-origin:bottom center;transform:rotateX(-54deg);border-radius:1px 1px 0 0;
  background:linear-gradient(180deg,#8ff0c0 0%,#3fae74 55%,#1c6644 100%);box-shadow:0 0 9px rgba(63,174,116,.55);animation:barG .8s cubic-bezier(.34,1.4,.64,1) backwards}
.bar3d.dim{background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,.04));box-shadow:none;width:3px;margin-left:-1.5px}
.bar3d:hover{width:8px;margin-left:-4px;box-shadow:0 0 16px rgba(76,196,135,.9);z-index:6}
@keyframes barG{from{transform:rotateX(-54deg) scaleY(0);opacity:0}to{transform:rotateX(-54deg) scaleY(1);opacity:1}}
.est-tick{position:absolute;bottom:calc(50% - 16px);font:600 8px 'JetBrains Mono',monospace;color:rgba(255,255,255,.4);transform:translateX(-50%) rotateX(-54deg);transform-origin:bottom center;z-index:1}
.scene-cap{position:absolute;left:16px;right:16px;bottom:12px;display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.9);z-index:4;animation:capF .6s 1.7s both}
.scene-cap .mono{color:var(--accent-2)}
.scene-lgd{position:absolute;top:12px;right:14px;display:flex;gap:12px;font:600 9px 'JetBrains Mono',monospace;color:rgba(255,255,255,.55);z-index:4;animation:capF .6s 1.9s both}
.scene-lgd i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle}
@keyframes capF{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){.scene-3d-stage,.bar3d{animation:none}.scene-3d-stage{transform:rotateX(54deg) rotateZ(-7deg)}}
@media(max-width:700px){.scene-3d{height:200px}.road-3d{width:90%;height:96px}}
/* mapa de estacas */
.est-cells{display:flex;gap:2px}
.est-cell{flex:1;height:24px;border-radius:3px;min-width:5px;transition:background .3s}

input,select,textarea{font-family:inherit;font-size:14px;padding:9.5px 12px;border:1px solid var(--border-strong);
  border-radius:var(--r-sm);background:var(--surface);color:var(--text);width:100%;outline:none;transition:all .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
label.fl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.field{margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>.field{flex:1;min-width:150px}

.obras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.obra-card{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;
  cursor:pointer;transition:all .2s cubic-bezier(.2,0,0,1);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px}
.obra-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.2,0,0,1)}
.obra-card:hover{transform:translateY(-4px);box-shadow:var(--sh-md);border-color:var(--accent)}
.obra-card:hover::after{transform:scaleX(1)}
.obra-card.add{border-style:dashed;align-items:center;justify-content:center;color:var(--muted);min-height:180px;text-align:center;cursor:default}
.obra-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.obra-nome{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.25}
.obra-meta{font-size:12.5px;color:var(--muted)}
.obra-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;gap:12px}

.empty{text-align:center;color:var(--muted);padding:40px 20px}
.empty .ic{font-size:38px;opacity:.5;margin-bottom:10px}
.hide{display:none!important}

@media (max-width:860px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:sticky;top:0;flex-direction:row;align-items:center;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--border);z-index:10}
  .brand{border-bottom:none;border-right:1px solid var(--border);flex-shrink:0;padding:12px 14px}
  .brand-txt{display:none}
  .nav{display:flex;padding:6px;flex:1;gap:2px}
  .nav-label{display:none}
  .nav-item{flex-direction:column;gap:2px;padding:7px 12px;font-size:10.5px;white-space:nowrap;flex-shrink:0}
  .nav-badge{position:absolute;margin:0;transform:translate(14px,-6px)}
  .side-foot{border-top:none;border-left:1px solid var(--border);flex-shrink:0}
  .content{padding:18px 15px 60px}
  .topbar{padding:13px 15px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .g4{grid-template-columns:repeat(2,1fr)}
  .proj-wrap{flex-direction:column}
  .proj-list{width:100%!important}
}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:capF .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);max-width:540px;width:100%;max-height:82vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.modal-h{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);
  color:var(--bg);padding:12px 22px;border-radius:30px;font-weight:600;font-size:13.5px;z-index:100;
  box-shadow:0 10px 30px rgba(0,0,0,.25);transition:transform .3s;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ---------- Modo Apresentação (auto-pilot executivo, fullscreen) ---------- */
#apres{position:fixed;inset:0;z-index:400;color:#f2ede3;display:flex;flex-direction:column;
  font-family:'Space Grotesk',system-ui,sans-serif;animation:capF .4s;
  background:radial-gradient(ellipse at 50% -10%,rgba(31,111,74,.22),transparent 55%),linear-gradient(160deg,#14120e,#1c1813 60%,#0f0d0a);

<body>
<div id="app"></div>

<script src="vendor/pdfjs/pdf.min.js"></script>
<script src="vendor/xlsx/xlsx.bundle.js"></script>
<script src="dados/ruas-de-terra.js"></script>
<script src="dados/teotonio-vilela.js"></script>
<script src="dados/_index.js"></script>
<script>
/* ============================================================
   Gestor — Controle de Obras (estático, multi-obra, localStorage)
   Modelo FÍSICO: serviços com quantidade/unidade. Sem valores (R$).
   ============================================================ */
'use strict';
const OBRAS = window.OBRAS || {};
const ORDEM = (window.OBRAS_ORDEM || Object.keys(OBRAS)).filter(id => OBRAS[id]);
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const ICONE = {1:'▣',2:'▤',3:'▥',4:'✖',5:'◇',6:'✎',7:'≈',8:'⛰'};
const FUNCOES = ['Encarregado','Pedreiro','Servente','Operador de máquina','Motorista','Carpinteiro','Armador','Sinalizador','Auxiliar geral','Topógrafo','Vigia','Ajudante'];
const EQUIPS = ['Retroescavadeira','Escavadeira hidráulica','Pá-carregadeira','Motoniveladora','Rolo compactador','Placa vibratória','Caminhão basculante','Caminhão pipa','Vibroacabadora','Betoneira','Prancha/Guincho','Mini-carregadeira'];
const CLIMA_OPC = ['Bom','Nublado','Chuva fraca','Chuva forte','Impraticável'];

const estado = { obraId:null, tela:'home', filtroRua:'Todas', mesMed:'', diarioData:'', projSel:'', painelFrente:'Todas', painelMes:'Todos' };

const el = id => document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtNum(n,d=2){return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtBRL(n){return 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtBRLc(n){n=n||0;if(n>=1e6)return 'R$ '+(n/1e6).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+' mi';if(n>=1e3)return 'R$ '+(n/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+' mil';return fmtBRL(n);}
function fmtQtd(n){return (n||0).toLocaleString('pt-BR',{maximumFractionDigits:2});}
function fmtPct(n,d=1){return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})+'%';}
function hoje(){return new Date().toISOString().slice(0,10);}
function mesLabel(iso){const[a,m]=iso.split('-');return MESES[(+m)-1]+'/'+a.slice(2);}
function addMeses(iso,n){const d=new Date(iso+'T00:00:00');d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function clamp(n){return Math.max(0,Math.min(100,n));}

/* ---------- storage ---------- */
function keyL(obraId){return 'gestor:rdo:'+obraId;}
function getLanc(obraId){try{return JSON.parse(localStorage.getItem(keyL(obraId))||'[]');}catch(e){return[];}}
function setLanc(obraId,arr){localStorage.setItem(keyL(obraId),JSON.stringify(arr));}
function getDiarios(obraId){try{return JSON.parse(localStorage.getItem('gestor:diario:'+obraId)||'[]');}catch(e){return[];}}
function setDiarios(obraId,arr){localStorage.setItem('gestor:diario:'+obraId,JSON.stringify(arr));}
function diarioDoDia(obraId,dataISO){return getDiarios(obraId).find(d=>d.dataISO===dataISO)||null;}

/* ============================================================
   BACKEND — Google Sheets (leitura via CSV publicado, gravação via
   Apps Script/JSONP com fila offline). Enquanto CONFIG.appsScript
   estiver vazio, tudo roda em modo LOCAL (localStorage), sem mudar nada.
   Preencha o CONFIG após montar a planilha (ver SETUP-BACKEND.md).
   ============================================================ */
const CONFIG = {
  appsScript: 'https://script.google.com/macros/s/AKfycbyMBWiCRypVKFY5maZeVRQrxN82R8my729DhXd18AJ8hBKBg5dxj4D3Uy52_r_dyhnCkw/exec',
  csv: { rdo: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfyzEdBOsa1k5T7minhY-n-Dd4xsa11zQsV2ErrWSfIj7ZQZVTN8VRZD7kAR_FQJUIlYyShkrqccyI/pub?gid=0&single=true&output=csv', diario: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfyzEdBOsa1k5T7minhY-n-Dd4xsa11zQsV2ErrWSfIj7ZQZVTN8VRZD7kAR_FQJUIlYyShkrqccyI/pub?gid=1308635253&single=true&output=csv' },
  usuarios: ['Leonardo', 'Wallace', 'Guilherme'],
  exigirLogin: true
};
const BACKEND = !!CONFIG.appsScript;

/* --- sessão/login --- */
function getToken(){return localStorage.getItem('gestor:token')||'';}
function usuarioAtual(){return localStorage.getItem('gestor:usuario')||'';}
function setToken(t,u){if(t){localStorage.setItem('gestor:token',t);localStorage.setItem('gestor:usuario',u||'');}else{localStorage.removeItem('gestor:token');localStorage.removeItem('gestor:usuario');}}
function authParams(){return getToken()?{token:getToken()}:{};}
function sair(){setToken('',''); estado.obraId=null; estado.tela='home'; render();}

/* --- JSONP com retry --- */
function jsonp(url,params,retries=2,delay=2500){
  return new Promise((resolve,reject)=>{
    const cb='__cb'+Date.now()+Math.floor(Math.random()*1e6);
    const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const s=document.createElement('script'); let done=false;
    const cleanup=()=>{try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.remove();};
    const falha=()=>{if(done)return;done=true;cleanup();if(retries>0)setTimeout(()=>jsonp(url,params,retries-1,delay).then(resolve,reject),delay);else reject(new Error('rede'));};
    window[cb]=(data)=>{if(done)return;done=true;cleanup();resolve(data);};
    s.onerror=falha; setTimeout(falha,15000);
    s.src=url+'?'+qs+'&callback='+cb; document.body.appendChild(s);
  });
}

/* --- CSV --- */
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else if(c==='"')q=true; else if(c===','){row.push(cur);cur='';}
    else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
    else if(c!=='\r')cur+=c;}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).filter(r=>r.some(x=>x!=='')).map(r=>{const o={};head.forEach((h,i)=>o[h]=r[i]!==undefined?r[i]:'');return o;});
}
async function fetchCSV(url){const res=await fetch(url+(url.indexOf('?')>-1?'&':'?')+'_='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('CSV '+res.status);return parseCSV(await res.text());}
function csvNum(v){if(typeof v==='number')return v;if(v==null||v==='')return 0;let s=String(v).trim();const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');if(lc>-1&&ld>-1){s=lc>ld?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');}else if(lc>-1)s=s.replace(',','.');const n=parseFloat(s);return isNaN(n)?0:n;}
function csvISO(v){if(!v)return '';v=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);const m=v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);return v.slice(0,10);}
function csvBool(v){return v===true||String(v).toLowerCase()==='true';}
function jparse(s,def){try{return JSON.parse(s||'');}catch(e){return def;}}
function rowToLanc(o){return {id:o.id,clientId:o.clientid||o.id,dataISO:csvISO(o.data),rua:o.rua,capId:o.capid===''?null:parseInt(csvNum(o.capid),10),servico:o.servico,un:o.un,qtd:csvNum(o.qtd),efetivo:csvNum(o.efetivo),estIni:o.estini||'',estFim:o.estfim||'',clima:o.clima,obs:o.obs,avulso:csvBool(o.avulso),criadoEm:csvNum(o.criadoem)||Date.now()};}
function rowToDiario(o){return {id:o.id,dataISO:csvISO(o.data),climaManha:o.climamanha,climaTarde:o.climatarde,condicao:o.condicao,pessoal:jparse(o.pessoal,[]),equipamentos:jparse(o.equipamentos,[]),ocorrencias:o.ocorrencias,criadoEm:csvNum(o.criadoem)||Date.now()};}

/* --- fila offline (outbox) --- */
const OUTBOX_KEY='gestor:outbox';
function outboxLer(){try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]');}catch(e){return[];}}
function outboxGravar(a){localStorage.setItem(OUTBOX_KEY,JSON.stringify(a));atualizaOutboxUI();}
function outboxAdd(it){const a=outboxLer();a.push(it);outboxGravar(a);}
function outboxRemove(id){outboxGravar(outboxLer().filter(x=>x.id!==id));}
async function outboxFlush(){
  if(!BACKEND||!navigator.onLine)return;
  for(const it of outboxLer()){
    // POST (FormData): dados do RDO/Diário NÃO trafegam na URL. postAcao anexa o token.
    try{const r=await postAcao(it.params);
      if(r&&r.error&&/TOKEN/i.test(r.error)){toast('Sessão expirada — entre novamente');break;}
      outboxRemove(it.id);
    }catch(e){break;}
  }
}
function atualizaOutboxUI(){
  let elx=el('outboxInd'); const n=outboxLer().length;
  if(!n){if(elx)elx.remove();return;}
  if(!elx){elx=document.createElement('div');elx.id='outboxInd';
    elx.style.cssText='position:fixed;bottom:20px;right:20px;z-index:150;background:var(--amarelo);color:#fff;padding:9px 14px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.3)';
    elx.onclick=()=>outboxFlush(); document.body.appendChild(elx);}
  elx.textContent='⇅ '+n+' p/ enviar';
}

/* --- envio (enfileira + tenta enviar) --- */
function enfileirarRDO(obraId,l){if(!BACKEND)return;
  const item={obra:obraId,data:l.dataISO,rua:l.rua,capid:l.capId,servico:l.servico,un:l.un,qtd:l.qtd,efetivo:l.efetivo,estini:l.estIni,estfim:l.estFim,clima:l.clima,obs:l.obs,avulso:l.avulso,criadoem:l.criadoEm,id:l.id};
  outboxAdd({id:'ob'+uid(),clientId:l.id,obra:obraId,tipo:'rdo',params:{action:'addBatchRDO',batch:JSON.stringify([item]),clientId:l.id}});outboxFlush();}
function enfileirarDelRDO(obraId,id){if(!BACKEND)return;outboxAdd({id:'ob'+uid(),obra:obraId,tipo:'delRdo',params:{action:'deleteRDO',id:id}});outboxFlush();}
function enfileirarDiario(obraId,d){if(!BACKEND)return;
  const item={action:'addDiario',obra:obraId,data:d.dataISO,climamanha:d.climaManha,climatarde:d.climaTarde,condicao:d.condicao,pessoal:JSON.stringify(d.pessoal||[]),equipamentos:JSON.stringify(d.equipamentos||[]),ocorrencias:d.ocorrencias,criadoem:d.criadoEm,id:d.id||''};
  outboxAdd({id:'ob'+uid(),obra:obraId,tipo:'diario',dados:d,params:item});outboxFlush();}
function enfileirarDelDiario(obraId,id){if(!BACKEND)return;outboxAdd({id:'ob'+uid(),obra:obraId,tipo:'delDiario',params:{action:'deleteDiario',id:id}});outboxFlush();}

/* --- leitura do servidor (CSV) e reconciliação com pendências --- */
async function carregarObra(obraId){
  if(isDemo())return;                 // modo demonstração: sync pausado (não sobrescreve os dados fictícios)
  if(!BACKEND||!CONFIG.csv.rdo)return;
  try{
    const [rdoRows,diaRows]=await Promise.all([fetchCSV(CONFIG.csv.rdo),CONFIG.csv.diario?fetchCSV(CONFIG.csv.diario):Promise.resolve([])]);
    const srvLanc=rdoRows.filter(o=>String(o.obra).trim()===obraId).map(rowToLanc);
    const srvDia =diaRows.filter(o=>String(o.obra).trim()===obraId).map(rowToDiario);
    // mantém pendências ainda não confirmadas no servidor
    const pendCli=new Set(outboxLer().filter(it=>it.tipo==='rdo').map(it=>it.clientId));
    const naoConf=getLanc(obraId).filter(l=>pendCli.has(l.clientId||l.id)&&!srvLanc.some(s=>(s.clientId||s.id)===(l.clientId||l.id)));
    const mrg={};[...srvLanc,...naoConf].forEach(l=>{mrg[l.clientId||l.id]=l;});
    setLanc(obraId,Object.values(mrg));
    let dias=srvDia;
    outboxLer().filter(it=>it.tipo==='diario'&&it.obra===obraId).forEach(pd=>{dias=[...dias.filter(d=>d.dataISO!==pd.dados.dataISO),pd.dados];});
    setDiarios(obraId,dias);
  }catch(e){console.warn('sync: leitura falhou (mantendo local)',e);}
}

/* ---------- domínio (físico) ---------- */
function obra(){return OBRAS[estado.obraId];}
function frenteNome(o,id){const f=(o.frentes||[]).find(x=>x.id===id);return f?f.nome:('Frente '+id);}
function estacaTxt(l){const a=(l.estIni||'').trim(),b=(l.estFim||'').trim();if(!a&&!b)return '';return (b&&b!==a)?(a+' a '+b):(a||b);}
function skey(rua,capId,servico){return rua+'§'+capId+'§'+servico;}
function skeyS(s){return skey(s.rua,s.capId,s.servico);}
// qtd acumulada por serviço
function avancoServ(o){
  const m={}; getLanc(o.id).forEach(l=>{if(l.avulso)return;const k=skey(l.rua,l.capId,l.servico);m[k]=(m[k]||0)+(+l.qtd||0);});
  return m;
}
function pctServ(s,av){return s.qtdPrev? (av[skeyS(s)]||0)/s.qtdPrev*100 : 0;}
// média simples de % (índice físico não-ponderado)
function mediaPct(servicos,av){
  if(!servicos.length)return 0;
  return servicos.reduce((a,s)=>a+clamp(pctServ(s,av)),0)/servicos.length;
}
// malha de meses da obra
function pontos(o){
  const n=o.prazoMeses||(o.cronograma[0]?.pctMes.length||6); const p=[];
  for(let m=0;m<n;m++){const iso=addMeses(o.inicioISO,m);p.push({idx:m,mes:iso.slice(0,7),label:mesLabel(iso)});}
  return p;
}
// curva prevista (% acumulado, média simples das frentes) — usa % do cronograma
function curvaPrev(o,pts){
  const fr=o.cronograma||[]; if(!fr.length)return pts.map(()=>0);
  return pts.map((_,m)=>{
    const acc=fr.map(c=>clamp(c.pctMes.slice(0,m+1).reduce((a,b)=>a+b,0)));
    return acc.reduce((a,b)=>a+b,0)/acc.length;
  });
}
// curva realizada (% acumulado por mês, média simples dos serviços)
function curvaReal(o,pts){
  const serv=o.servicos||[]; const lanc=getLanc(o.id);
  return pts.map(p=>{
    const cum={};
    lanc.forEach(l=>{if(l.dataISO.slice(0,7)<=p.mes){const k=skey(l.rua,l.capId,l.servico);cum[k]=(cum[k]||0)+(+l.qtd||0);}});
    if(!serv.length)return 0;
    return serv.reduce((a,s)=>a+clamp(s.qtdPrev?(cum[skeyS(s)]||0)/s.qtdPrev*100:0),0)/serv.length;
  });
}

/* ============================================================ RENDER */
const NAV=[
  {grupo:'Análise',itens:[
    {id:'executivo',ic:'◆',t:'Painel Executivo'},
    {id:'servicos',ic:'▤',t:'Serviços'},
    {id:'medicao',ic:'⌗',t:'Medição Física'},
  ]},
  {grupo:'Operação',itens:[
    {id:'rdo',ic:'⊕',t:'Lançar serviços'},
    {id:'diario',ic:'📋',t:'Diário de Obra',badge:o=>getDiarios(o.id).length},
    {id:'equip',ic:'🚜',t:'Equipamentos'},
    {id:'historico',ic:'≡',t:'Histórico',badge:o=>getLanc(o.id).length},
  ]},
  {grupo:'Documentos',itens:[
    {id:'projetos',ic:'📐',t:'Projetos',badge:o=>(o.projetos||[]).length},

async function fazerLogin(){
  const u=el('loginUser').value, p=el('loginPass').value;
  if(!p){el('loginErro').textContent='Informe a senha.';return;}
  el('loginErro').textContent='Entrando...';
  try{
    // login via POST (FormData): a senha NÃO trafega na URL/query (fora de logs e histórico)
    const r=await postAcao({action:'login',usuario:u,senha:p});
    if(r&&r.ok&&r.token){setToken(r.token,r.usuario);outboxFlush();render();}
    else el('loginErro').textContent=(r&&/CREDENC/i.test(r.error||''))?'Usuário ou senha incorretos.':((r&&r.error)||'Falha ao entrar.');
  }catch(e){el('loginErro').textContent='Sem conexão com o servidor.';}
}

/* ---------- PAINEL EXECUTIVO ---------- */
function viewExecutivo(o){
  const serv=o.servicos||[]; const av=avancoServ(o);
  const pf=mediaPct(serv,av);
  const concl=serv.filter(s=>pctServ(s,av)>=99.95).length;
  const inic=serv.filter(s=>pctServ(s,av)>0).length;
  const fimISO=addMeses(o.inicioISO,o.prazoMeses);
  const tot=new Date(fimISO)-new Date(o.inicioISO);
  const pctPrazo=clamp(tot?(new Date()-new Date(o.inicioISO))/tot*100:0);
  const pts=pontos(o); const prev=curvaPrev(o,pts); const real=curvaReal(o,pts);
  const idxHoje=pts.filter(p=>p.mes<=hoje().slice(0,7)).length-1;
  const desvio=idxHoje>=0?real[idxHoje]-prev[idxHoje]:0;
  const kpis=[
    {l:'Avanço físico médio',v:fmtPct(pf),s:'média dos '+serv.length+' serviços',bar:pf},
    {l:'Prazo decorrido',v:Math.round(pctPrazo)+'%',s:mesLabel(o.inicioISO)+' → '+mesLabel(fimISO),bar:pctPrazo},
    {l:'Serviços iniciados',v:inic+'/'+serv.length,s:concl+' concluídos'},
    {l:'Desvio vs previsto',v:(desvio>=0?'+':'')+fmtPct(desvio),s:desvio>=0?'adiantado/no prazo':'atrasado'},
  ];
  const linhasFrente=(o.frentes||[]).map(f=>{
    const sf=serv.filter(s=>s.capId===f.id); if(!sf.length)return '';
    const p=mediaPct(sf,av); const ci=sf.filter(s=>pctServ(s,av)>=99.95).length;
    return `<tr><td>${ICONE[f.id]||'•'} ${esc(f.nome)}</td><td class="num">${sf.length}</td>
      <td class="num">${ci}</td><td><span class="minibar"><i style="width:${clamp(p).toFixed(1)}%"></i></span></td>
      <td class="num">${fmtPct(p)}</td></tr>`;
  }).join('');
  return `
  <div class="grid g4" style="margin-bottom:18px">
    ${kpis.map(k=>`<div class="kpi"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div>
      <div class="kpi-s">${k.s}</div>${k.bar!=null?`<div class="bar"><i style="width:${clamp(k.bar).toFixed(1)}%"></i></div>`:''}</div>`).join('')}
  </div>
  <div class="grid g2" style="grid-template-columns:1.3fr 1fr;margin-bottom:18px">
    <div class="card"><div class="card-h"><div><div class="card-t">Curva S — Avanço físico</div>
      <div class="card-st">Previsto (cronograma) × Realizado (RDO) — % médio acumulado</div></div>
      <div style="display:flex;gap:14px;font-size:11.5px;font-weight:600">
        <span style="color:var(--azul)">■ Previsto</span><span style="color:var(--accent)">■ Realizado</span></div></div>
      <div class="card-b">${curvaSVG(pts,prev,real)}</div></div>
    <div class="card"><div class="card-h"><div class="card-t">Avanço por rua</div></div><div class="card-b">
      ${o.ruas.map(ru=>{const sr=serv.filter(s=>s.rua===ru);const p=mediaPct(sr,av);
        return `<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:6px">
          <span>${esc(ru)}</span><span class="mono">${fmtPct(p)}</span></div>
          <div class="bar" style="margin:0"><i style="width:${clamp(p).toFixed(1)}%"></i></div>
          <div class="kpi-s" style="margin-top:5px">${sr.length} serviços</div></div>`;}).join('')}
      ${getLanc(o.id).length===0?`<div class="empty" style="padding:14px"><div class="ic">◔</div>Nenhum apontamento ainda. Registre no <b>Lançar serviços</b>.</div>`:''}
    </div></div>
  </div>
  <div class="card"><div class="card-h"><div class="card-t">Avanço por frente de serviço</div>
    <div class="card-st">${(o.frentes||[]).length} frentes · % físico médio</div></div>
    <div class="tbl-wrap" style="border:none"><table class="t">
      <thead><tr><th>Frente</th><th class="num">Serviços</th><th class="num">Concluídos</th><th>Avanço</th><th class="num">%</th></tr></thead>
      <tbody>${linhasFrente}</tbody></table></div></div>
  ${ruasAnim(o)}
  ${mapaEstacas(o)}`;
}
/* cenas 3D das ruas (avenida em perspectiva, barras por estaca) */
function nEstacas(o,rua){return (o.estacas&&o.estacas[rua])||12;}
function ativPorEstaca(o,rua,lf){
  const n=nEstacas(o,rua); const ls=lf.filter(l=>l.rua===rua); const v=[];
  for(let i=1;i<=n;i++){let c=0;ls.forEach(l=>{let a=parseEst(l.estIni),b=parseEst(l.estFim);if(a==null&&b==null)return;if(a==null)a=b;if(b==null)b=a;if(i>=Math.min(a,b)&&i<=Math.max(a,b))c++;});v.push(c);}
  return v;
}
function cena3D(o,rua,ri,lf,maxG){
  const n=nEstacas(o,rua); const val=ativPorEstaca(o,rua,lf);
  const bars=val.map((v,idx)=>{
    const left=n<=1?50:(idx/(n-1))*100;
    const h=v===0?9:Math.round(18+(v/maxG)*80);
    const tick=(idx===0||idx===n-1||(idx+1)%5===0)?`<div class="est-tick" style="left:${left}%">E${idx+1}</div>`:'';
    return `<div class="bar3d ${v===0?'dim':''}" onclick="detalheEstaca(${ri},${idx+1})" style="left:${left}%;height:${h}px;animation-delay:${(idx*0.045+0.3).toFixed(2)}s;cursor:pointer" title="Estaca E${idx+1}: ${v} serviço(s) — clique p/ detalhar"></div>${tick}`;
  }).join('');
  const ativas=val.filter(v=>v>0).length;
  return `<div><div class="scene-3d">
    <div class="scene-lgd"><span><i style="background:linear-gradient(180deg,#8ff0c0,#1c6644)"></i>com avanço</span><span><i style="background:rgba(255,255,255,.24)"></i>sem avanço</span></div>
    <div class="scene-3d-stage"><div class="road-3d">${bars}</div></div>
    <div class="scene-cap"><span>${esc(rua)}</span><span class="mono">${ativas}/${n} estacas com avanço</span></div>
  </div></div>`;
}
function ruasAnim(o){
  const lf=lancPainel(o);
  const maxG=Math.max(1,...o.ruas.map(r=>Math.max(0,...ativPorEstaca(o,r,lf))));
  return `<div class="card" style="margin-top:18px"><div class="card-h"><div><div class="card-t">Ruas — avanço físico por estaca</div>
    <div class="card-st">altura da barra = serviços executados no trecho de cada estaca · clique numa estaca para detalhar</div></div></div>
    <div class="card-b"><div class="grid g2">${o.ruas.map((rua,ri)=>cena3D(o,rua,ri,lf,maxG)).join('')}</div></div></div>`;
}
function detalheEstaca(ri,i){
  const o=obra(); const rua=o.ruas[ri]; if(!rua)return;
  const ls=lancPainel(o).filter(l=>{if(l.rua!==rua)return false;let a=parseEst(l.estIni),b=parseEst(l.estFim);if(a==null&&b==null)return false;if(a==null)a=b;if(b==null)b=a;return i>=Math.min(a,b)&&i<=Math.max(a,b);});
  const body=ls.length?ls.sort((a,b)=>a.capId-b.capId).map(l=>`<div style="padding:11px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px">
      <div><div style="font-weight:600;font-size:14px">${esc(l.servico)} ${l.avulso?'<span class="chip" style="padding:0 6px;font-size:10px">avulso</span>':''}</div>
      <div class="kpi-s">${esc(frenteNome(o,l.capId))} · ${new Date(l.dataISO+'T00:00:00').toLocaleDateString('pt-BR')} · trecho ${esc(estacaTxt(l))}</div></div>
      <div class="num" style="font-weight:700">${fmtQtd(l.qtd)} ${esc(l.un)}</div></div>`).join('')
    :`<div class="empty" style="padding:30px"><div class="ic">◔</div>Nenhum serviço lançado nesta estaca${(estado.painelFrente!=='Todas'||estado.painelMes!=='Todos')?' com os filtros atuais':''}.</div>`;
  abrirModal(`Estaca E${i} — ${esc(rua)}`,`<div class="kpi-s" style="margin-bottom:4px">${ls.length} serviço(s) executado(s) no trecho da estaca</div>${body}`);
}
function abrirModal(titulo,html){
  fecharModal();
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';
  bg.onclick=e=>{if(e.target===bg)fecharModal();};
  bg.innerHTML=`<div class="modal"><div class="modal-h"><div class="card-t">${titulo}</div>
    <button class="btn btn-sm btn-ghost" onclick="fecharModal()">✕</button></div>

}
function fecharModal(){const m=el('modalBg');if(m)m.remove();}
/* mapa de avanço por estaca e rua (heatmap do RDO) + filtros */
function parseEst(s){const m=String(s||'').match(/\d+/);return m?parseInt(m[0],10):null;}
function lancPainel(o){
  return getLanc(o.id).filter(l=>{
    if(estado.painelFrente!=='Todas'&&String(l.capId)!==String(estado.painelFrente))return false;
    if(estado.painelMes!=='Todos'&&l.dataISO.slice(0,7)!==estado.painelMes)return false;
    return true;
  });
}
function estacasRua(o,rua,lf){
  const n=nEstacas(o,rua); const ls=lf.filter(l=>l.rua===rua); const segs=[];
  for(let i=1;i<=n;i++){let c=0; ls.forEach(l=>{let a=parseEst(l.estIni),b=parseEst(l.estFim); if(a==null&&b==null)return; if(a==null)a=b; if(b==null)b=a; if(i>=Math.min(a,b)&&i<=Math.max(a,b))c++;}); segs.push({i,c});}
  return {n,segs,total:ls.length};
}
function mapaEstacas(o){
  const lf=lancPainel(o);
  const meses=[...new Set(getLanc(o.id).map(l=>l.dataISO.slice(0,7)))].sort();
  const filtros=`<div class="row" style="gap:10px;margin:0">
    <div class="field" style="margin:0;max-width:240px"><label class="fl">Frente / serviço</label>
      <select onchange="setPFrente(this.value)"><option value="Todas" ${estado.painelFrente==='Todas'?'selected':''}>Todas as frentes</option>
      ${(o.frentes||[]).map(f=>`<option value="${f.id}" ${String(estado.painelFrente)===String(f.id)?'selected':''}>${f.id}. ${esc(f.nome)}</option>`).join('')}</select></div>
    <div class="field" style="margin:0;max-width:180px"><label class="fl">Mês</label>
      <select onchange="setPMes(this.value)"><option value="Todos" ${estado.painelMes==='Todos'?'selected':''}>Todos os meses</option>
      ${meses.map(m=>`<option value="${m}" ${estado.painelMes===m?'selected':''}>${mesLabel(m+'-01')}</option>`).join('')}</select></div></div>`;
  const rows=o.ruas.map((rua,ri)=>{
    const em=estacasRua(o,rua,lf);

    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px"><span>${esc(rua)}</span><span class="kpi-s">${em.total} lançamento(s)</span></div>
      <div class="est-cells">${cells}</div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:3px"><span>E1</span><span>E${em.n}</span></div></div>`;
  }).join('');
  return `<div class="card" style="margin-top:18px"><div class="card-h"><div><div class="card-t">Mapa de avanço por estaca</div>
    <div class="card-st">atividade por estaca em cada rua, a partir dos trechos lançados no RDO</div></div></div>
    <div class="card-b">${filtros}<div style="margin-top:14px">${rows}</div>
    <div class="kpi-s" style="margin-top:4px">Cor mais forte = mais serviços lançados naquela estaca (respeita os filtros).</div></div></div>`;
}
function curvaSVG(pts,prev,real){
  const W=560,H=230,pad=34,pw=W-pad*2,ph=H-pad*2,n=pts.length;
  if(!n)return '<div class="empty">Sem cronograma</div>';
  const x=i=>pad+(n<=1?pw/2:pw*i/(n-1)), y=v=>pad+ph*(1-clamp(v)/100);
  const gy=[0,25,50,75,100].map(g=>`<line x1="${pad}" y1="${y(g)}" x2="${W-pad}" y2="${y(g)}" stroke="var(--border)"/>
    <text x="${pad-6}" y="${y(g)+4}" text-anchor="end" font-size="10" fill="var(--muted)">${g}%</text>`).join('');
  const gx=pts.map((p,i)=>`<text x="${x(i)}" y="${H-pad+16}" text-anchor="middle" font-size="10" fill="var(--muted)">${p.label}</text>`).join('');
  const lp=prev.map((v,i)=>`${x(i)},${y(v)}`).join(' '), lr=real.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const dp=prev.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="var(--azul)"/>`).join('');
  const dr=real.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="var(--accent)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${gy}${gx}
    <polyline points="${lp}" fill="none" stroke="var(--azul)" stroke-width="2.2" stroke-dasharray="5 4"/>
    <polyline points="${lr}" fill="none" stroke="var(--accent)" stroke-width="2.6"/>${dp}${dr}</svg>`;
}

function viewMedicao(o){
  const lanc=getLanc(o.id);

  if(!estado.mesMed&&meses.length)estado.mesMed=meses[meses.length-1];
  const mes=estado.mesMed;
  const doMes=lanc.filter(l=>l.dataISO.slice(0,7)===mes && !l.avulso);
  const agg={};
  doMes.forEach(l=>{const s=(o.servicos||[]).find(x=>x.rua===l.rua&&x.capId===l.capId&&x.servico===l.servico);
    const k=skey(l.rua,l.capId,l.servico);(agg[k]=agg[k]||{s:s||{servico:l.servico,rua:l.rua,capId:l.capId,un:l.un,qtdPrev:0},q:0}).q+=(+l.qtd||0);});
  const av=avancoServ(o);

let _pdfToken=0,_pdfDoc=null,_pdfUrl='',_pdfZoom=1;
function fallbackPDF(url){return `<div class="empty" style="padding:44px 20px"><div class="ic">📄</div>Não foi possível renderizar o PDF.<br><a class="btn btn-pri" style="margin-top:14px" href="${esc(url)}" target="_blank" rel="noopener">Abrir projeto ⬈</a></div>`;}
function renderPdfDoc(url){
  const box=el('pdfViewer');if(!box||!url)return;
  if(_pdfDoc&&_pdfUrl===url){drawPdf();return;}          // já carregado: só desenha
  const tok=++_pdfToken;
  if(!window.pdfjsLib){box.innerHTML=fallbackPDF(url);return;}
  box.innerHTML='<div class="empty" style="padding:40px"><div class="ic">⏳</div>Carregando projeto…</div>';
  window.pdfjsLib.getDocument(url).promise.then(pdf=>{
    if(tok!==_pdfToken)return;
    _pdfDoc=pdf;_pdfUrl=url;drawPdf();
  }).catch(()=>{if(tok===_pdfToken)box.innerHTML=fallbackPDF(url);});
}
async function drawPdf(){
  const box=el('pdfViewer');if(!box||!_pdfDoc)return;
  const tok=++_pdfToken;box.innerHTML='';
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w1=(await _pdfDoc.getPage(1)).getViewport({scale:1}).width;
  const fit=Math.max(280,box.clientWidth-28)/w1;          // zoom=1 => ajustado à largura
  const scale=fit*_pdfZoom;
  for(let n=1;n<=_pdfDoc.numPages;n++){
    if(tok!==_pdfToken)return;
    const page=await _pdfDoc.getPage(n);
    const vp=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=Math.floor(vp.width*dpr);canvas.height=Math.floor(vp.height*dpr);
    canvas.style.cssText='width:'+Math.floor(vp.width)+'px;height:'+Math.floor(vp.height)+'px;max-width:none;display:block;margin:0 auto 14px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.18);border-radius:2px';
    box.appendChild(canvas);
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp,transform:dpr!==1?[dpr,0,0,dpr,0,0]:undefined}).promise;
  }
  const lbl=el('pdfZoomLbl');if(lbl)lbl.textContent=Math.round(_pdfZoom*100)+'%';
}
function pdfZoomLbl(){const l=el('pdfZoomLbl');if(l)l.textContent=Math.round(_pdfZoom*100)+'%';}
function pdfZoom(d){_pdfZoom=Math.min(4,Math.max(0.4,+(_pdfZoom+d).toFixed(2)));pdfZoomLbl();drawPdf();}
function pdfZoomReset(){_pdfZoom=1;pdfZoomLbl();drawPdf();}

function coletaDiario(){
  return {dataISO:estado.diarioData,climaManha:el('dManha').value,climaTarde:el('dTarde').value,
    condicao:el('dCond').value,pessoal:lerPessoal(),equipamentos:lerEquip(),ocorrencias:el('dOcor').value.trim()};
}
function salvarDiario(){
  const o=obra();const dd=coletaDiario();
  const anterior=diarioDoDia(o.id,dd.dataISO);
  const novo={id:(anterior&&anterior.id)||uid(),...dd,criadoEm:Date.now()};
  const arr=getDiarios(o.id).filter(x=>x.dataISO!==dd.dataISO);arr.push(novo);
  setDiarios(o.id,arr);enfileirarDiario(o.id,novo);toast('Diário salvo ✓');render();
}
function delDiario(dataISO){const o=obra();if(!confirm('Excluir o diário de '+new Date(dataISO+'T00:00:00').toLocaleDateString('pt-BR')+'?'))return;
  const d=diarioDoDia(o.id,dataISO);
  setDiarios(o.id,getDiarios(o.id).filter(x=>x.dataISO!==dataISO));
  if(d&&d.id)enfileirarDelDiario(o.id,d.id);render();toast('Diário excluído');}
// nº do RDO da data (posição cronológica entre todas as datas com diário ou serviço)
function numeroRDO(o,dataISO){
  const datas=[...new Set([...getDiarios(o.id).map(x=>x.dataISO),...getLanc(o.id).map(l=>l.dataISO)])].sort();
  return datas.indexOf(dataISO)+1;
}
// monta os dados do RDO de uma data (diário salvo + serviços do dia)
function montarRDO(o,dataISO){
  const d=diarioDoDia(o.id,dataISO)||{};
  return {dataISO,climaManha:d.climaManha||'—',climaTarde:d.climaTarde||'—',condicao:d.condicao||'Normal',
    pessoal:d.pessoal||[],equipamentos:d.equipamentos||[],ocorrencias:d.ocorrencias||'',
    servicos:getLanc(o.id).filter(l=>l.dataISO===dataISO)};
}

/* ---------- Excel no modelo do RDO (xlsx-js-style) ---------- */
function _brd(){const s={style:'thin',color:{rgb:'CCCCCC'}};return {top:s,bottom:s,left:s,right:s};}
function wsRDO(o,dd,numero){
  const aoa=[],merges=[],st={};
  const put=(r,c,v,s)=>{while(aoa.length<=r)aoa.push([]);const row=aoa[r];while(row.length<=c)row.push('');row[c]=v;if(s)st[r+','+c]=s;};
  const green={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1F6F4A'}},alignment:{vertical:'center'}};
  const hdr={font:{bold:true},fill:{fgColor:{rgb:'F0EFE9'}},border:_brd()};
  const cel={border:_brd()},celR={border:_brd(),alignment:{horizontal:'right'}},bold={font:{bold:true}};
  let r=0;
  put(r,0,'RELATÓRIO DIÁRIO DE OBRA',{font:{bold:true,sz:14,color:{rgb:'1F6F4A'}}});put(r,3,'RDO Nº '+numero,{font:{bold:true,sz:12},alignment:{horizontal:'right'}});merges.push({s:{r,c:0},e:{r,c:2}});r++;
  put(r,0,o.nome,bold);merges.push({s:{r,c:0},e:{r,c:3}});r++;
  put(r,0,(o.contratada||'Gestor Engenharia')+' · '+(o.contrato||''));merges.push({s:{r,c:0},e:{r,c:3}});r+=2;
  const dataBR=new Date(dd.dataISO+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  put(r,0,'Data: '+dataBR,bold);put(r,3,'Condição: '+dd.condicao,{alignment:{horizontal:'right'}});merges.push({s:{r,c:0},e:{r,c:2}});r++;
  put(r,0,'Clima — Manhã: '+dd.climaManha+'   Tarde: '+dd.climaTarde);merges.push({s:{r,c:0},e:{r,c:3}});r+=2;
  put(r,0,'MÃO DE OBRA',green);put(r,2,'EQUIPAMENTOS',green);merges.push({s:{r,c:0},e:{r,c:1}});merges.push({s:{r,c:2},e:{r,c:3}});r++;
  put(r,0,'Função',hdr);put(r,1,'Qtd',hdr);put(r,2,'Equipamento',hdr);put(r,3,'Qtd',hdr);r++;
  const nmax=Math.max(dd.pessoal.length,dd.equipamentos.length,1);
  for(let i=0;i<nmax;i++){const p=dd.pessoal[i],e=dd.equipamentos[i];
    put(r,0,p?p.funcao:'',cel);put(r,1,p?p.qtd:'',celR);put(r,2,e?e.nome:'',cel);put(r,3,e?e.qtd:'',celR);r++;}
  put(r,0,'Total',hdr);put(r,1,totalPessoal(dd.pessoal),{...hdr,alignment:{horizontal:'right'}});put(r,2,'',cel);put(r,3,'',cel);r+=2;
  put(r,0,'SERVIÇOS EXECUTADOS',green);merges.push({s:{r,c:0},e:{r,c:3}});r++;
  put(r,0,'Serviço',hdr);put(r,1,'Rua',hdr);put(r,2,'Trecho (estacas)',hdr);put(r,3,'Quantidade',hdr);r++;
  if(dd.servicos.length)dd.servicos.forEach(l=>{put(r,0,l.servico+(l.avulso?' (avulso)':''),cel);put(r,1,l.rua,cel);put(r,2,estacaTxt(l)||'—',cel);put(r,3,fmtQtd(l.qtd)+' '+l.un,celR);r++;});
  else{put(r,0,'Sem serviços lançados',cel);put(r,1,'',cel);put(r,2,'',cel);put(r,3,'',cel);r++;}
  r++;
  put(r,0,'OCORRÊNCIAS / OBSERVAÇÕES',green);merges.push({s:{r,c:0},e:{r,c:3}});r++;
  put(r,0,dd.ocorrencias||'—',{border:_brd(),alignment:{wrapText:true,vertical:'top'}});put(r,1,'',cel);put(r,2,'',cel);put(r,3,'',cel);merges.push({s:{r,c:0},e:{r,c:3}});r+=3;
  put(r,0,'______________________________');put(r,2,'______________________________');r++;
  put(r,0,'Responsável técnico');put(r,2,'Fiscalização');
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges']=merges; ws['!cols']=[{wch:40},{wch:12},{wch:30},{wch:14}];
  Object.keys(st).forEach(k=>{const [rr,cc]=k.split(',').map(Number);const ref=XLSX.utils.encode_cell({r:rr,c:cc});if(!ws[ref])ws[ref]={t:'s',v:''};ws[ref].s=st[k];});
  return ws;
}
function nomeAba(d){return 'RDO '+d.replace(/-/g,'');}
function todasDatas(o){return [...new Set([...getDiarios(o.id).map(x=>x.dataISO),...getLanc(o.id).map(l=>l.dataISO)])].sort();}
function gerarExcelDia(dataISO){const o=obra();const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,wsRDO(o,montarRDO(o,dataISO),numeroRDO(o,dataISO)),nomeAba(dataISO));XLSX.writeFile(wb,'RDO_'+o.id+'_'+dataISO+'.xlsx');toast('Excel gerado ✓');}
function gerarExcelTudo(){const o=obra();const datas=todasDatas(o);if(!datas.length){toast('Nada para exportar');return;}const wb=XLSX.utils.book_new();datas.forEach(d=>XLSX.utils.book_append_sheet(wb,wsRDO(o,montarRDO(o,d),numeroRDO(o,d)),nomeAba(d)));XLSX.writeFile(wb,'RDOs_'+o.id+'_'+hoje()+'.xlsx');toast('Excel gerado ✓');}

      <div class="field"><label class="fl">Rua</label><select id="edRua">${o.ruas.map(r=>`<option ${r===l.rua?'selected':''}>${esc(r)}</option>`).join('')}</select></div></div>

function apFitDocs(){
  document.querySelectorAll('#apres iframe.doc-a4').forEach(ifr=>{
    if(!apFitDoc1(ifr))ifr.addEventListener('load',()=>apFitDoc1(ifr),{once:true});
  });
}
function apFitDoc1(ifr){
  try{
    const d=ifr.contentDocument;if(!d||!d.body)return false;
    const land=ifr.dataset.orient==='land';const baseW=land?1123:794;
    // largura-base p/ o documento reflowir como A4, depois mede o conteúdo real
    ifr.style.transform='none';ifr.style.width=baseW+'px';ifr.style.height='auto';
    const cW=Math.max(baseW,d.body.scrollWidth,d.documentElement.scrollWidth);
    const cH=Math.max(d.body.scrollHeight,d.documentElement.scrollHeight);
    if(!cH)return false;
    const single=document.querySelectorAll('#apres iframe.doc-a4').length<=1;
    const fr=ifr.parentElement,card=fr.closest('.ap-doc');
    const maxW=Math.max(200,(card?card.clientWidth:480)-24);
    const maxH=Math.max(300,window.innerHeight*(single?0.66:0.52));
    const scale=Math.min(maxW/cW,maxH/cH);
    ifr.style.width=cW+'px';ifr.style.height=cH+'px';ifr.style.transform='scale('+scale+')';
    fr.style.width=Math.round(cW*scale)+'px';fr.style.height=Math.round(cH*scale)+'px';
    return true;
  }catch(e){return false;}
}

  APRES.slides=apMontarSlides();APRES.on=true;APRES.idx=0;APRES.playing=true;
  const ov=document.createElement('div');ov.id='apres';ov.style.setProperty('--apdur',(APRES.dur/1000)+'s');
  const segs=APRES.slides.map(()=>'<span class="seg"><i></i></span>').join('');
  ov.innerHTML=`
    <div class="ap-top"><img src="assets/logo_gestor.png" alt=""><div><div class="t">Gestor — Controle de Obras</div><div class="s">Modo apresentação</div></div>
      <div class="ap-prog">${segs}</div></div>
    <div class="ap-stage" id="apStage"></div>
    <div class="ap-ctrl"><button type="button" onclick="apGo(-1)">← Anterior</button>
      <button type="button" id="apPlay" onclick="apPlayPause()">⏸ Pausar</button>
      <button type="button" onclick="apGo(1)">Próximo →</button>
      <button type="button" onclick="apFechar()">✕ Sair</button></div>
    <div class="ap-credits">Criado e desenvolvido por <b>Leonardo Maciel</b></div>`;
  document.body.appendChild(ov);
  APRES.keyH=e=>{if(e.key==='Escape')apFechar();else if(e.key==='ArrowRight')apGo(1);else if(e.key==='ArrowLeft')apGo(-1);else if(e.key===' '){e.preventDefault();apPlayPause();}};
  document.addEventListener('keydown',APRES.keyH);
  APRES.rz=()=>{if(APRES.on&&APRES.slides[APRES.idx]&&APRES.slides[APRES.idx].tipo==='relatorios')apFitDocs();};
  window.addEventListener('resize',APRES.rz);
  try{if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});}catch(e){}
  apRender();
}
function apFechar(){
  clearTimeout(APRES.timer);APRES.on=false;
  if(APRES.keyH){document.removeEventListener('keydown',APRES.keyH);APRES.keyH=null;}
  if(APRES.rz){window.removeEventListener('resize',APRES.rz);APRES.rz=null;}
  const o=el('apres');if(o)o.remove();
  try{if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});}catch(e){}
}

function _demoSeed(o){
  let seed=987654321;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  const pick=a=>a[Math.floor(rnd()*a.length)];const climas=['Bom','Bom','Nublado','Bom','Chuva fraca','Bom'];
  const isoAdd=(b,d)=>{const x=new Date(b+'T00:00:00');x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);};
  const start=o.inicioISO||hoje();const estN=o.estacas||{};const servs=o.servicos||[];const lanc=[];
  servs.forEach((s,si)=>{const alvo=0.32+rnd()*0.55,tot=(s.qtdPrev||0)*alvo,k=2+Math.floor(rnd()*4);let rest=tot;
    for(let j=0;j<k;j++){let q=(j===k-1)?rest:tot/k*(0.7+rnd()*0.6);rest-=q;if(q<=0)continue;
      const dia=isoAdd(start,2+Math.floor(rnd()*88));const nEst=estN[s.rua]||12;const e1=1+Math.floor(rnd()*Math.max(1,nEst-3));const e2=Math.min(nEst,e1+1+Math.floor(rnd()*4));
      lanc.push({id:uid(),dataISO:dia,rua:s.rua,capId:s.capId,servico:s.servico,un:s.un,qtd:+Math.max(0.1,q).toFixed(2),efetivo:4+Math.floor(rnd()*10),estIni:'E'+e1,estFim:'E'+e2,clima:pick(climas),obs:'',criadoEm:Date.now()-si*1000-j*100});}});
  const datas=[...new Set(lanc.map(l=>l.dataISO))].sort();
  const diarios=datas.slice(0,14).map((d,i)=>({id:uid(),dataISO:d,climaManha:pick(climas),climaTarde:pick(climas),condicao:'Normal',
    pessoal:FUNCOES.slice(0,3+Math.floor(rnd()*3)).map(f=>({funcao:f,qtd:1+Math.floor(rnd()*6)})),
    equipamentos:EQUIPS.slice(0,2+Math.floor(rnd()*3)).map(e=>({nome:e,qtd:1+Math.floor(rnd()*2)})),
    ocorrencias:i%3===0?'Recebimento de material e liberação de frente de serviço.':'',criadoEm:Date.now()-i*1000}));
  return {lanc,diarios};
}
function carregarDemo(){
  if(!confirm('Carregar DADOS DE DEMONSTRAÇÃO (fictícios)?\n\nPreenche as obras com lançamentos, diários e equipamentos de exemplo — só neste navegador, para apresentação. A sincronização com a nuvem fica pausada até você sair da demonstração.'))return;
  ORDEM.map(id=>OBRAS[id]).filter(o=>o&&!o.externo).forEach(o=>{const s=_demoSeed(o);setLanc(o.id,s.lanc);setDiarios(o.id,s.diarios);});
  EQUIP=_demoEquip();
  localStorage.setItem('gestor:demo','1');
  toast('Modo demonstração ativado ✓');render();
}
function sairDemo(){
  if(!confirm('Sair do modo demonstração e limpar os dados fictícios deste navegador?\n\nOs dados reais voltam a sincronizar da nuvem normalmente.'))return;
  ORDEM.map(id=>OBRAS[id]).filter(o=>o&&!o.externo).forEach(o=>{localStorage.removeItem(keyL(o.id));localStorage.removeItem('gestor:diario:'+o.id);});
  localStorage.removeItem('gestor:demo');
  EQUIP={equipamentos:[],locadoras:[],apontamentos:[],carregado:false};
  estado.tela='home';estado.obraId=null;toast('Modo demonstração encerrado');render();
}

function toast(m){let t=el('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
